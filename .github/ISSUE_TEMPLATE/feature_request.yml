name: Feature request
description: Suggest an improvement to the WebUI
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature!

        **Note**: This WebUI's job is to generate configs the upstream SRA Terraform can consume. Features that change SRA behavior should be filed against [databricks/terraform-databricks-sra](https://github.com/databricks/terraform-databricks-sra), not here.

  - type: textarea
    id: use-case
    attributes:
      label: What's the use case?
      description: What are you trying to accomplish?
    validations:
      required: true

  - type: textarea
    id: current
    attributes:
      label: How does the WebUI handle this today?
      description: What's the current experience? Screenshot helpful.

  - type: textarea
    id: proposed
    attributes:
      label: Proposed improvement
      description: What would you like to see instead?
    validations:
      required: true

  - type: input
    id: sra-variable
    attributes:
      label: Related SRA Terraform variable (if any)
      description: Link to the variable in `terraform-databricks-sra/{aws,azure,gcp}/.../variables.tf` if relevant
      placeholder: e.g. https://github.com/databricks/terraform-databricks-sra/blob/main/aws/tf/variables.tf#L59

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
